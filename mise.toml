[tasks.build]
description = "Compile the menubar app"
run = "swiftc -O -swift-version 5 -o sticky-agent-monitor main.swift"
sources = ["main.swift"]
outputs = ["sticky-agent-monitor"]

[tasks.start]
description = "Build and start the menubar app in the background (survives closing the terminal)"
depends = ["build"]
run = "./sticky-agent-monitor"

[tasks.foreground]
description = "Run attached to this terminal (for debugging)"
depends = ["build"]
run = "./sticky-agent-monitor --foreground"

[tasks.stop]
description = "Stop the background menubar app"
run = "./sticky-agent-monitor --stop"

[tasks.status]
description = "Check whether the menubar app is running"
run = "./sticky-agent-monitor --status"
